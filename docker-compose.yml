version: '3.8'

services:
  db:
    image: postgres:16-alpine
    container_name: memoirdraft-db
    ports:
      - "${HOST_PORT:-5432}:5432"
    volumes:
      - pg_memoirdraft_data:/var/lib/postgresql/data
    environment:
      POSTGRES_USER: ${DB_USER:-postgres}
      POSTGRES_PASSWORD: ${DB_PASSWORD:-admin}
      POSTGRES_DB: ${DB_NAME:-memoirdraft_db}
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${DB_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5

volumes:
  pg_memoirdraft_data: